    <!--
      Pre-create AudioContext and expose window.__audioStream synchronously,
      before React mounts and before the Replit export tool initialises.
      This guarantees the stream is available when startRecording is set up.
    -->
    <script>
      try {
        (function () {
          var ctx = new AudioContext();
          var comp = ctx.createDynamicsCompressor();
          comp.threshold.value = -14;
          comp.ratio.value = 3;
          comp.knee.value = 12;
          comp.connect(ctx.destination);
          var dest = ctx.createMediaStreamDestination();
          comp.connect(dest);
          window.audioStream = dest.stream;
          window.__bitecastAudio = { ctx: ctx, comp: comp };
        })();
      } catch (e) {
        console.warn('[bitecast] audio pre-init failed:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
